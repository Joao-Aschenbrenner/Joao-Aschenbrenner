<svg width="420" height="195" viewBox="0 0 420 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
  <title id="titleId">Linguagens do Portfolio</title>
  <desc id="descId">PHP/Laravel 49%, Python 17%, JavaScript/TypeScript 15%, HTML/CSS 5%, C# 4%, Java 4%, Go 3%, Outros 3%</desc>
  <style>
    .bg { fill: #282A36; }
    .border { stroke: #E4E2E2; stroke-width: 1; fill: none; }
    .title { font: 600 14px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .lang-name { font: 400 11px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .lang-pct { font: 700 11px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .bar-bg { fill: #44475A; rx: 4; }
  </style>
  <rect class="bg" width="420" height="195" rx="6"/>
  <rect class="border" x="0.5" y="0.5" width="419" height="194" rx="6"/>

  <text x="20" y="28" class="title">Linguagens do Portfolio</text>

  <!-- PHP/Laravel 49% (bar: 366*0.49 = 179px) -->
  <circle cx="22" cy="52" r="4" fill="#777BB4"/>
  <text x="34" y="56" class="lang-name">PHP (Laravel)</text>
  <text x="395" y="56" class="lang-pct" text-anchor="end">49%</text>
  <rect class="bar-bg" x="34" y="62" width="366" height="8"/>
  <rect fill="#777BB4" x="34" y="62" width="179" height="8" rx="4"/>

  <!-- Python 17% (bar: 62px) -->
  <circle cx="22" cy="80" r="4" fill="#3572A5"/>
  <text x="34" y="84" class="lang-name">Python</text>
  <text x="395" y="84" class="lang-pct" text-anchor="end">17%</text>
  <rect class="bar-bg" x="34" y="90" width="366" height="8"/>
  <rect fill="#3572A5" x="34" y="90" width="62" height="8" rx="4"/>

  <!-- JavaScript/TypeScript 15% (bar: 55px) -->
  <circle cx="22" cy="108" r="4" fill="#3178C6"/>
  <text x="34" y="112" class="lang-name">JavaScript / TypeScript</text>
  <text x="395" y="112" class="lang-pct" text-anchor="end">15%</text>
  <rect class="bar-bg" x="34" y="118" width="366" height="8"/>
  <rect fill="#3178C6" x="34" y="118" width="55" height="8" rx="4"/>

  <!-- HTML/CSS 5% (bar: 18px) -->
  <circle cx="22" cy="136" r="4" fill="#E34C26"/>
  <text x="34" y="140" class="lang-name">HTML / CSS</text>
  <text x="395" y="140" class="lang-pct" text-anchor="end">5%</text>
  <rect class="bar-bg" x="34" y="146" width="366" height="8"/>
  <rect fill="#E34C26" x="34" y="146" width="18" height="8" rx="4"/>

  <!-- C# 4% (bar: 15px) -->
  <circle cx="22" cy="164" r="4" fill="#178600"/>
  <text x="34" y="168" class="lang-name">C#</text>
  <text x="395" y="168" class="lang-pct" text-anchor="end">4%</text>
  <rect class="bar-bg" x="34" y="174" width="366" height="8"/>
  <rect fill="#178600" x="34" y="174" width="15" height="8" rx="4"/>

  <!-- Java 4% (bar: 15px) -->
  <circle cx="222" cy="52" r="4" fill="#B07219"/>
  <text x="234" y="56" class="lang-name">Java (Spring)</text>
  <text x="395" y="56" class="lang-pct" text-anchor="end">4%</text>
  <rect class="bar-bg" x="234" y="62" width="161" height="8"/>
  <rect fill="#B07219" x="234" y="62" width="15" height="8" rx="4"/>

