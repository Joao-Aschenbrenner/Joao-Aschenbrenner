<svg width="420" height="180" viewBox="0 0 420 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
  <title id="titleId">Linguagens do Portfolio</title>
  <desc id="descId">PHP/Laravel 35%, Java/Spring 25%, TypeScript 18%, Go 10%, C# 7%, Python 3%, SQL 2%</desc>
  <style>
    .bg { fill: #282A36; }
    .border { stroke: #E4E2E2; stroke-width: 1; fill: none; }
    .title { font: 600 14px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .lang-name { font: 400 11px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .lang-pct { font: 700 11px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .bar-bg { fill: #44475A; rx: 4; }
    .bar-fill { rx: 4; height: 8; }
  </style>
  <rect class="bg" width="420" height="180" rx="6"/>
  <rect class="border" x="0.5" y="0.5" width="419" height="179" rx="6"/>

  <text x="20" y="28" class="title">Linguagens do Portfolio</text>

  <!-- PHP/Laravel 35% -->
  <circle cx="22" cy="52" r="4" fill="#777BB4"/>
  <text x="34" y="56" class="lang-name">PHP (Laravel)</text>
  <text x="395" y="56" class="lang-pct" text-anchor="end">35%</text>
  <rect class="bar-bg" x="34" y="62" width="366" height="8"/>
  <rect class="bar-fill" x="34" y="62" width="128" height="8" fill="#777BB4"/>

  <!-- Java/Spring 25% -->
  <circle cx="22" cy="82" r="4" fill="#B07219"/>
  <text x="34" y="86" class="lang-name">Java (Spring)</text>
  <text x="395" y="86" class="lang-pct" text-anchor="end">25%</text>
  <rect class="bar-bg" x="34" y="92" width="366" height="8"/>
  <rect class="bar-fill" x="34" y="92" width="91" height="8" fill="#B07219"/>

  <!-- TypeScript 18% -->
  <circle cx="22" cy="112" r="4" fill="#3178C6"/>
  <text x="34" y="116" class="lang-name">TypeScript</text>
  <text x="395" y="116" class="lang-pct" text-anchor="end">18%</text>
  <rect class="bar-bg" x="34" y="122" width="366" height="8"/>
  <rect class="bar-fill" x="34" y="122" width="66" height="8" fill="#3178C6"/>

  <!-- Go 10% -->
  <circle cx="22" cy="142" r="4" fill="#00ADD8"/>
  <text x="34" y="146" class="lang-name">Go</text>
  <text x="395" y="146" class="lang-pct" text-anchor="end">10%</text>
  <rect class="bar-bg" x="34" y="152" width="366" height="8"/>
  <rect class="bar-fill" x="34" y="152" width="37" height="8" fill="#00ADD8"/>

  <!-- C# 7% -->
  <circle cx="222" cy="52" r="4" fill="#178600"/>
  <text x="234" y="56" class="lang-name">C#</text>
  <text x="395" y="56" class="lang-pct" text-anchor="end">7%</text>
  <rect class="bar-bg" x="234" y="62" width="161" height="8"/>
  <rect class="bar-fill" x="234" y="62" width="11" height="8" fill="#178600"/>

  <!-- Python 3% -->
  <circle cx="222" cy="82" r="4" fill="#3572A5"/>
  <text x="234" y="86" class="lang-name">Python</text>
  <text x="395" y="86" class="lang-pct" text-anchor="end">3%</text>
  <rect class="bar-bg" x="234" y="92" width="161" height="8"/>
  <rect class="bar-fill" x="234" y="92" width="5" height="8" fill="#3572A5"/>

  <!-- SQL 2% -->
  <circle cx="222" cy="112" r="4" fill="#E38C00"/>
  <text x="234" y="116" class="lang-name">SQL</text>
  <text x="395" y="116" class="lang-pct" text-anchor="end">2%</text>
  <rect class="bar-bg" x="234" y="122" width="161" height="8"/>
  <rect class="bar-fill" x="234" y="122" width="3" height="8" fill="#E38C00"/>

</svg>
