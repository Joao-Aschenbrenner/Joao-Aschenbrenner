<svg width="420" height="230" viewBox="0 0 420 230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
  <title id="titleId">Linguagens do Portfolio</title>
  <desc id="descId">PHP/Laravel 49%, Python 17%, JavaScript/TypeScript 15%, HTML/CSS 5%, C# 4%, Java 4%, Go 3%, Outros 3%</desc>
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="php" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#777BB4"/>
      <stop offset="100%" stop-color="#5A5E8F"/>
    </linearGradient>
    <linearGradient id="py" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3572A5"/>
      <stop offset="100%" stop-color="#2A5A80"/>
    </linearGradient>
    <linearGradient id="ts" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3178C6"/>
      <stop offset="100%" stop-color="#245A96"/>
    </linearGradient>
    <linearGradient id="html" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E34C26"/>
      <stop offset="100%" stop-color="#B83D1E"/>
    </linearGradient>
    <linearGradient id="cs" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#178600"/>
      <stop offset="100%" stop-color="#0F5E00"/>
    </linearGradient>
    <linearGradient id="java" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B07219"/>
      <stop offset="100%" stop-color="#8A5A12"/>
    </linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#0085A8"/>
    </linearGradient>
    <linearGradient id="outros" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B8B8B"/>
      <stop offset="100%" stop-color="#6B6B6B"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #282A36; }
    .border { stroke: #E4E2E2; stroke-width: 1; fill: none; }
    .title { font: 600 14px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .lang-name { font: 500 11px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .lang-pct { font: 700 11px 'Segoe UI', Ubuntu, sans-serif; fill: #F8F8F2; }
    .bar-bg { fill: #1E1F29; }
    .bar-overlay { fill: url(#barGrad); }
  </style>

  <rect class="bg" width="420" height="230" rx="6"/>
  <rect class="border" x="0.5" y="0.5" width="419" height="229" rx="6"/>
  <rect class="border" x="18" y="42" width="384" height="1" opacity="0.1"/>

  <text x="20" y="28" class="title" filter="url(#shadow)">Linguagens do Portfolio</text>

  <!-- PHP/Laravel 49%: 380*0.49 = 186px -->
  <text x="22" y="62" class="lang-name">PHP (Laravel)</text>
  <text x="398" y="62" class="lang-pct" text-anchor="end">49%</text>
  <rect class="bar-bg" x="22" y="70" width="380" height="10" rx="5"/>
  <rect fill="url(#php)" x="22" y="70" width="186" height="10" rx="5"/>
  <rect class="bar-overlay" x="22" y="70" width="186" height="10" rx="5"/>

  <!-- Python 17%: 380*0.17 = 65px -->
  <text x="22" y="96" class="lang-name">Python</text>
  <text x="398" y="96" class="lang-pct" text-anchor="end">17%</text>
  <rect class="bar-bg" x="22" y="104" width="380" height="10" rx="5"/>
  <rect fill="url(#py)" x="22" y="104" width="65" height="10" rx="5"/>
  <rect class="bar-overlay" x="22" y="104" width="65" height="10" rx="5"/>

  <!-- JavaScript/TypeScript 15%: 380*0.15 = 57px -->
  <text x="22" y="130" class="lang-name">JavaScript / TypeScript</text>
  <text x="398" y="130" class="lang-pct" text-anchor="end">15%</text>
  <rect class="bar-bg" x="22" y="138" width="380" height="10" rx="5"/>
  <rect fill="url(#ts)" x="22" y="138" width="57" height="10" rx="5"/>
  <rect class="bar-overlay" x="22" y="138" width="57" height="10" rx="5"/>

  <!-- HTML/CSS 5%: 380*0.05 = 19px -->
  <text x="22" y="164" class="lang-name">HTML / CSS</text>
  <text x="398" y="164" class="lang-pct" text-anchor="end">5%</text>
  <rect class="bar-bg" x="22" y="172" width="380" height="10" rx="5"/>
  <rect fill="url(#html)" x="22" y="172" width="19" height="10" rx="5"/>
  <rect class="bar-overlay" x="22" y="172" width="19" height="10" rx="5"/>

  <!-- C# 4%: 380*0.04 = 15px -->
  <text x="22" y="198" class="lang-name">C#</text>
  <text x="398" y="198" class="lang-pct" text-anchor="end">4%</text>
  <rect class="bar-bg" x="22" y="206" width="380" height="10" rx="5"/>
  <rect fill="url(#cs)" x="22" y="206" width="15" height="10" rx="5"/>
  <rect class="bar-overlay" x="22" y="206" width="15" height="10" rx="5"/>

  <!-- Java 4%: 19px -->
  <text x="222" y="62" class="lang-name">Java (Spring)</text>
  <text x="398" y="62" class="lang-pct" text-anchor="end">4%</text>
  <rect class="bar-bg" x="222" y="70" width="180" height="10" rx="5"/>
  <rect fill="url(#java)" x="222" y="70" width="15" height="10" rx="5"/>
  <rect class="bar-overlay" x="222" y="70" width="15" height="10" rx="5"/>

  <!-- Go 3%: 12px -->
  <text x="222" y="96" class="lang-name">Go</text>
  <text x="398" y="96" class="lang-pct" text-anchor="end">3%</text>
  <rect class="bar-bg" x="222" y="104" width="180" height="10" rx="5"/>
  <rect fill="url(#go)" x="222" y="104" width="12" height="10" rx="5"/>
  <rect class="bar-overlay" x="222" y="104" width="12" height="10" rx="5"/>

  <!-- Outros 3%: 12px -->
  <text x="222" y="130" class="lang-name">Outros (Dart, SQL, Shell)</text>
  <text x="398" y="130" class="lang-pct" text-anchor="end">3%</text>
  <rect class="bar-bg" x="222" y="138" width="180" height="10" rx="5"/>
  <rect fill="url(#outros)" x="222" y="138" width="12" height="10" rx="5"/>
  <rect class="bar-overlay" x="222" y="138" width="12" height="10" rx="5"/>

</svg>
