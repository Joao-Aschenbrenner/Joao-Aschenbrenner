<svg xmlns="http://www.w3.org/2000/svg" width="420" height="180" viewBox="0 0 420 180" role="img" aria-label="Language usage chart">
  <defs>
    <style>
      .bg { fill: #1a1b27; stroke: #44475a; stroke-width: 1; }
      .title { fill: #f8f8f2; font: 700 12px monospace; }
      .subtitle { fill: #a8b3cf; font: 10px monospace; }
      .legend { fill: #f8f8f2; font: 12px monospace; }
      .pct { font-weight: 700; }

      .main { opacity: 0; animation: fadeIn 700ms ease-out forwards; }
      .slice {
        opacity: 0;
        transform-origin: 95px 90px;
        animation: popIn 550ms ease-out forwards;
      }
      .s1 { animation-delay: 120ms; }
      .s2 { animation-delay: 240ms; }
      .s3 { animation-delay: 360ms; }
      .s4 { animation-delay: 480ms; }
      .s5 { animation-delay: 600ms; }

      .ring {
        opacity: 0.35;
        animation: pulse 2400ms ease-in-out infinite;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes popIn {
        from { opacity: 0; transform: scale(0.62); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.5; }
      }
    </style>
  </defs>

  <rect class="bg" x="0.5" y="0.5" width="419" height="179" rx="10" ry="10" />

  <g class="main">
    <text x="24" y="21" class="title">Current Language Mix</text>
    <text x="24" y="36" class="subtitle">Based on active work: InternalSystem + ENIAC-AI-DRIVEN</text>

    <path class="slice s1" d="M95,90 L95,26 A64,64 0 0,1 149.04,124.29 Z" fill="#777BB4" stroke="#1a1b27" stroke-width="1.4" />
    <path class="slice s2" d="M95,90 L149.04,124.29 A64,64 0 0,1 45.69,130.8 Z" fill="#F7DF1E" stroke="#1a1b27" stroke-width="1.4" />
    <path class="slice s3" d="M95,90 L45.69,130.8 A64,64 0 0,1 40.96,55.71 Z" fill="#3776AB" stroke="#1a1b27" stroke-width="1.4" />
    <path class="slice s4" d="M95,90 L40.96,55.71 A64,64 0 0,1 71.44,30.49 Z" fill="#E34F26" stroke="#1a1b27" stroke-width="1.4" />
    <path class="slice s5" d="M95,90 L71.44,30.49 A64,64 0 0,1 95,26 Z" fill="#00B4D8" stroke="#1a1b27" stroke-width="1.4" />

    <circle class="ring" cx="95" cy="90" r="28" fill="none" stroke="#8be9fd" stroke-width="1.5" />
    <circle cx="95" cy="90" r="26" fill="#1a1b27" />
    <text x="95" y="88" text-anchor="middle" class="subtitle">Lang</text>
    <text x="95" y="103" text-anchor="middle" class="title">2026</text>

    <g transform="translate(205, 42)">
      <g transform="translate(0, 0)">
        <circle cx="7" cy="7" r="6" fill="#777BB4" />
        <text x="22" y="11" class="legend">PHP <tspan class="pct" fill="#777BB4">34%</tspan></text>
      </g>

      <g transform="translate(0, 24)">
        <circle cx="7" cy="7" r="6" fill="#F7DF1E" />
        <text x="22" y="11" class="legend">JavaScript <tspan class="pct" fill="#F7DF1E">30%</tspan></text>
      </g>

      <g transform="translate(0, 48)">
        <circle cx="7" cy="7" r="6" fill="#3776AB" />
        <text x="22" y="11" class="legend">Python <tspan class="pct" fill="#3776AB">20%</tspan></text>
      </g>

      <g transform="translate(0, 72)">
        <circle cx="7" cy="7" r="6" fill="#E34F26" />
        <text x="22" y="11" class="legend">HTML/CSS <tspan class="pct" fill="#E34F26">10%</tspan></text>
      </g>

      <g transform="translate(0, 96)">
        <circle cx="7" cy="7" r="6" fill="#00B4D8" />
        <text x="22" y="11" class="legend">SQL <tspan class="pct" fill="#00B4D8">6%</tspan></text>
      </g>
    </g>
  </g>
</svg>
